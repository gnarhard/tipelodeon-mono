          type: array
          description: Count of tips grouped by payment method type for the reporting window.
          items:
            $ref: '#/components/schemas/PaymentMethodBreakdownEntry'
    PerformanceSessionStatsResponse:
      type: object
      description: |
        Stats aggregates scoped to a single performance session. Unlike
        `ProjectStatsResponse`, there is no `period`/`highlights`/`records`
        block — the session itself defines the window via `started_at`/`ended_at`.
      properties:
        started_at:
          type: string
          format: date-time
          nullable: true
          description: UTC timestamp when the session started.
        ended_at:
          type: string
          format: date-time
          nullable: true
          description: UTC timestamp when the session ended. Null for active sessions.
        money:
