        repeat_count:
          type: integer
          description: Audience profiles with two or more requests in the window.
    PaymentMethodBreakdownEntry:
      type: object
      properties:
        method:
          type: string
          description: Payment method type (e.g. card, apple_pay, google_pay, cash, unknown).
