          example: 5
    ProjectStatsResponse:
      type: object
      properties:
        period:
          $ref: '#/components/schemas/ProjectStatsPeriod'
        money:
          $ref: '#/components/schemas/ProjectStatsMoney'
        counts:
          $ref: '#/components/schemas/ProjectStatsCounts'
        highlights:
          $ref: '#/components/schemas/ProjectStatsHighlights'
        rankings:
          $ref: '#/components/schemas/ProjectStatsRankings'
        records:
          $ref: '#/components/schemas/ProjectStatsRecords'
        rewards_gifted:
          $ref: '#/components/schemas/ProjectStatsRewardsGifted'
