        counts:
          $ref: '#/components/schemas/ProjectStatsCounts'
        rankings:
          $ref: '#/components/schemas/ProjectStatsRankings'
        audience_loyalty:
          $ref: '#/components/schemas/ProjectStatsAudienceLoyalty'
        rewards_gifted:
          $ref: '#/components/schemas/ProjectStatsRewardsGifted'
        payment_method_breakdown:
          type: array
          description: Count of tips grouped by payment method type for this session.
          items:
            $ref: '#/components/schemas/PaymentMethodBreakdownEntry'
